<svg xmlns="http://www.w3.org/2000/svg" width="2480" height="3508" viewBox="0 0 2480 3508">
<defs><style>
.bg{fill:#080806}.panel{fill:#11100c;stroke:#caa45a;stroke-width:5}.card{fill:#15130f;stroke:#8f733f;stroke-width:2}.soft{fill:#1b1710;stroke:#d6b66f;stroke-width:3}.gold{fill:#d6b66f}.muted{fill:#9d927a}.rule{stroke:#8f733f;stroke-width:2}.rule2{stroke:#d6b66f;stroke-width:4}.title{font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Arial,sans-serif;font-size:94px;font-weight:780;fill:#f6edd7}.subtitle{font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,&quot;PingFang SC&quot;,Arial,sans-serif;font-size:34px;fill:#c7b98e}.section{font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,&quot;PingFang SC&quot;,Arial,sans-serif;font-size:44px;font-weight:760;fill:#f1d99b}.h3{font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,&quot;PingFang SC&quot;,Arial,sans-serif;font-size:32px;font-weight:720;fill:#f6edd7}.body{font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,&quot;PingFang SC&quot;,Arial,sans-serif;font-size:29px;fill:#eee3c7}.small{font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Arial,sans-serif;font-size:24px;fill:#9d927a}.num{font-family:Georgia,&quot;Times New Roman&quot;,serif;font-size:34px;font-weight:700;fill:#080806;text-anchor:middle;dominant-baseline:central}.claim{font-family:Georgia,&quot;Times New Roman&quot;,serif;font-size:29px;fill:#f6edd7}.claimNo{font-family:Georgia,&quot;Times New Roman&quot;,serif;font-size:27px;font-weight:700;fill:#080806;text-anchor:middle;dominant-baseline:central}
</style></defs><rect class="bg" width="2480" height="3508"/><rect class="panel" x="110" y="110" width="2260" height="3288" rx="34"/><line class="rule2" x1="170" y1="338" x2="2310" y2="338"/><text class="subtitle" x="170" y="214" text-anchor="start">Reading Review / Thought Map</text><text class="title" x="170" y="306" text-anchor="start">The World After Capital</text><text class="subtitle" x="170" y="394" text-anchor="start">Albert Wenger · A4 Logic Map</text><text class="small" x="2310" y="214" text-anchor="end">BLACK · GOLD · COMPACT</text><rect class="soft" x="170" y="470" width="1010" height="238" rx="24"/><text class="section" x="220" y="530" text-anchor="start">一句话概括</text><text class="body" x="220" y="592" text-anchor="start">数字技术把人类从“资本稀缺”推向“注意力稀缺”；</text><text class="body" x="220" y="636" text-anchor="start">知识时代需要经济自由、信息自由和心理自由。</text><rect class="card" x="1230" y="470" width="1140" height="238" rx="24"/><text class="section" x="1280" y="530" text-anchor="start">适合你的回访角度</text><text class="body" x="1280" y="592" text-anchor="start">学习英语不是输入词汇，而是训练参与知识循环：</text><text class="body" x="1280" y="636" text-anchor="start">阅读、表达、分享、接受反馈，再改进。</text><text class="section" x="170" y="806" text-anchor="start">逻辑脉络</text><line class="rule" x1="170" y1="838" x2="2310" y2="838"/><circle class="gold" cx="210" cy="938" r="38"/><text class="num" x="210" y="938">01</text><rect class="card" x="280" y="890" width="2030" height="152" rx="18"/><text class="h3" x="330" y="942" text-anchor="start">数字技术改变可能性空间</text><text class="body" x="330" y="994" text-anchor="start">零边际成本、机器智能和全球传播，使旧经济假设失效。</text><text class="body" x="330" y="1034" text-anchor="start">新技术不能被硬塞回旧制度框架。</text><line class="rule" x1="210" y1="978" x2="210" y2="1052"/><circle class="gold" cx="210" cy="1110" r="38"/><text class="num" x="210" y="1110">02</text><rect class="card" x="280" y="1062" width="2030" height="152" rx="18"/><text class="h3" x="330" y="1114" text-anchor="start">知识、乐观主义、人本主义</text><text class="body" x="330" y="1166" text-anchor="start">知识是可记录、可传播、可改进的信息。</text><text class="body" x="330" y="1206" text-anchor="start">乐观主义相信问题可解；人本主义强调人的责任。</text><line class="rule" x1="210" y1="1150" x2="210" y2="1224"/><circle class="gold" cx="210" cy="1282" r="38"/><text class="num" x="210" y="1282">03</text><rect class="card" x="280" y="1234" width="2030" height="152" rx="18"/><text class="h3" x="330" y="1286" text-anchor="start">稀缺的迁移</text><text class="body" x="330" y="1338" text-anchor="start">采集时代缺食物，农业时代缺土地，工业时代缺资本。</text><text class="body" x="330" y="1378" text-anchor="start">数字时代的新稀缺是注意力。</text><line class="rule" x1="210" y1="1322" x2="210" y2="1396"/><circle class="gold" cx="210" cy="1454" r="38"/><text class="num" x="210" y="1454">04</text><rect class="card" x="280" y="1406" width="2030" height="152" rx="18"/><text class="h3" x="330" y="1458" text-anchor="start">资本主义无法自动解决注意力分配</text><text class="body" x="330" y="1510" text-anchor="start">市场价格擅长配置资本，却很难配置注意力。</text><text class="body" x="330" y="1550" text-anchor="start">若注意力继续被劳动和消费占据，知识潜力会被压住。</text><line class="rule" x1="210" y1="1494" x2="210" y2="1568"/><circle class="gold" cx="210" cy="1626" r="38"/><text class="num" x="210" y="1626">05</text><rect class="card" x="280" y="1578" width="2030" height="152" rx="18"/><text class="h3" x="330" y="1630" text-anchor="start">扩展三种自由</text><text class="body" x="330" y="1682" text-anchor="start">UBI 释放时间；开放知识和计算资源加速传播。</text><text class="body" x="330" y="1722" text-anchor="start">正念与自我调节帮助抵抗信息操纵。</text><line class="rule" x1="210" y1="1666" x2="210" y2="1740"/><circle class="gold" cx="210" cy="1798" r="38"/><text class="num" x="210" y="1798">06</text><rect class="card" x="280" y="1750" width="2030" height="152" rx="18"/><text class="h3" x="330" y="1802" text-anchor="start">调节市场、保护民主、推动去中心化</text><text class="body" x="330" y="1854" text-anchor="start">缩小资本主义的统治范围，不是简单反市场。</text><text class="body" x="330" y="1894" text-anchor="start">让市场、监管、社会规范和去中心化服务知识循环。</text><line class="rule" x1="210" y1="1838" x2="210" y2="1912"/><circle class="gold" cx="210" cy="1970" r="38"/><text class="num" x="210" y="1970">07</text><rect class="card" x="280" y="1922" width="2030" height="152" rx="18"/><text class="h3" x="330" y="1974" text-anchor="start">知识时代的人本主义</text><text class="body" x="330" y="2026" text-anchor="start">目标不是更多消费，而是更多人学习、创造、分享。</text><text class="body" x="330" y="2066" text-anchor="start">人类要以知识循环作为新的目的来源。</text><text class="section" x="170" y="2154" text-anchor="start">Core Claims</text><line class="rule" x1="170" y1="2186" x2="2310" y2="2186"/><rect class="soft" x="280" y="2224" width="2030" height="116" rx="18"/><circle class="gold" cx="334" cy="2268" r="30"/><text class="claimNo" x="334" y="2268">1</text><text class="claim" x="392" y="2266" text-anchor="start">Capital is no longer the main binding constraint;</text><text class="claim" x="392" y="2304" text-anchor="start">attention is the new scarcity.</text><rect class="soft" x="280" y="2364" width="2030" height="116" rx="18"/><circle class="gold" cx="334" cy="2408" r="30"/><text class="claimNo" x="334" y="2408">2</text><text class="claim" x="392" y="2406" text-anchor="start">Knowledge grows through recording, sharing,</text><text class="claim" x="392" y="2444" text-anchor="start">criticism, and improvement.</text><rect class="soft" x="280" y="2504" width="2030" height="116" rx="18"/><circle class="gold" cx="334" cy="2548" r="30"/><text class="claimNo" x="334" y="2548">3</text><text class="claim" x="392" y="2546" text-anchor="start">A humane Knowledge Age requires economic freedom,</text><text class="claim" x="392" y="2584" text-anchor="start">informational freedom, and psychological freedom together.</text><rect class="soft" x="280" y="2644" width="2030" height="116" rx="18"/><circle class="gold" cx="334" cy="2688" r="30"/><text class="claimNo" x="334" y="2688">4</text><text class="claim" x="392" y="2686" text-anchor="start">Capitalism should be shrunk, not simply abolished:</text><text class="claim" x="392" y="2724" text-anchor="start">it should make room for participation in the knowledge loop.</text><rect class="soft" x="280" y="2784" width="2030" height="116" rx="18"/><circle class="gold" cx="334" cy="2828" r="30"/><text class="claimNo" x="334" y="2828">5</text><text class="claim" x="392" y="2826" text-anchor="start">Mindfulness and self-regulation are not private luxuries;</text><text class="claim" x="392" y="2864" text-anchor="start">they are civic capacities in an information-rich society.</text><rect class="soft" x="280" y="2924" width="2030" height="116" rx="18"/><circle class="gold" cx="334" cy="2968" r="30"/><text class="claimNo" x="334" y="2968">6</text><text class="claim" x="392" y="2966" text-anchor="start">Education should center curiosity, purpose, and</text><text class="claim" x="392" y="3004" text-anchor="start">psychological freedom rather than narrow employability.</text><rect class="soft" x="280" y="3064" width="2030" height="116" rx="18"/><circle class="gold" cx="334" cy="3108" r="30"/><text class="claimNo" x="334" y="3108">7</text><text class="claim" x="392" y="3106" text-anchor="start">Humanism gives the moral frame for acting responsibly</text><text class="claim" x="392" y="3144" text-anchor="start">amid climate risk, AI risk, and institutional transition.</text><line class="rule" x1="170" y1="3248" x2="2310" y2="3248"/><text class="small" x="170" y="3310" text-anchor="start">Generated from reading-system/01-reviews/the-world-after-capital-review.html</text><text class="small" x="2310" y="3310" text-anchor="end">A4 ratio · PNG + editable SVG</text></svg>